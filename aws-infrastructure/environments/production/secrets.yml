secrets:
  - name: shopify/access-token
    description: "Shopify Admin API access token for the webhook receiver Lambda"
  - name: shopify/webhook-secret
    description: "Shopify webhook signing secret, used to verify X-Shopify-Hmac-Sha256"
  - name: snowflake/webhook-private-key
    description: "RSA private key (PEM) for SHOPIFY_WEBHOOK_SVC key-pair auth"
  - name: datadog/api-key
    description: "Datadog API key for the shopify-engine batch sync ECS Fargate task's Agent sidecar"
  - name: snowflake/pipeline-private-key
    description: "RSA private key (PEM) for SHOPIFY_PIPELINE_SVC key-pair auth, used by the Airflow container's incremental-sync task"
  - name: snowflake/dbt-private-key
    description: "RSA private key (PEM) for DBT_TRANSFORM_SVC key-pair auth, used by the Airflow container's dbt run/snapshot tasks"
