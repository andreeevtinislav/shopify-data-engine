version: 2

sources:
  - name: shopify
    database: SHOPIFY_DATA
    schema: RAW
    config:
      loaded_at_field: _loaded_at
      freshness:
        warn_after: { count: 12, period: hour }
        error_after: { count: 24, period: hour }
    tables:
      - name: orders_json
        identifier: SHOPIFY_ORDERS_JSON
        description: "Raw Shopify order payloads (GraphQL Admin API), one row per order, MERGE-upserted by Shopify order id."
        columns:
          - name: _shopify_order_id
            tests: [not_null]

      - name: products_json
        identifier: SHOPIFY_PRODUCTS_JSON
        description: "Raw Shopify product payloads (GraphQL Admin API), one row per product, MERGE-upserted by Shopify product id."
        columns:
          - name: _shopify_product_id
            tests: [not_null]
